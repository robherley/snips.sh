name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  gotest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - run: script/vendor-onnxruntime && source script/env
    - name: Test
      uses: robherley/go-test-action@v1.1.0
      with:
        omit: untested
