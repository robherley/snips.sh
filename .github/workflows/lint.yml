name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: apt install just
      - run: just vendor-onnxruntime
      - run: just lint-go
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: apt install just
      - run: just lint-web
